global
    log stdout format raw local0

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend fe_443
    bind *:443
    mode tcp
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }
    use_backend be_acmesh if { req.ssl_alpn acme-tls/1 }
    default_backend be_https

backend be_acmesh
    mode tcp
    server acmesh nginx:5443

backend be_https
    mode tcp
    server nginx nginx:443 send-proxy
